name: Dev workflow

on:
#  schedule:
#    - cron:  '25 5 * * 0' # At 05:25 on Sunday
  # No `branches:` filter — run tests on every PR regardless of base, so stacked
  # PRs (base = a feature branch) aren't silently skipped (migration runbook Trap #14).
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Allows us to call the workflow from another workflow
  workflow_call:

jobs:
  call-test-workflow:
    uses: GNS-Science/nshm-github-actions/.github/workflows/python-run-tests-uv.yml@main
    with:
      operating-systems: "['ubuntu-latest']"
      python-versions: "['3.12']"
      delete-uv-lock: ${{ github.event_name == 'schedule' }}
      optional-dependency-groups: dev
    secrets: inherit
