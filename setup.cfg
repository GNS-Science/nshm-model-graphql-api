[coverage:run]
omit = nshm_model_graphql_api/nshm_model_graphql_api.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main

[tox:tox]
isolated_build = true
requires = tox-uv
envlist = audit, py312, format, lint, build

[gh-actions]
python =
    3.12: py312, format, lint, build

[testenv]
allowlist_externals = uv
dependency_groups = dev
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
    TESTING = 1
    UV_CACHE_DIR = {toxworkdir}/.uv-cache
commands =
    pytest --cov=pipeline --cov=nshm_model_graphql_api --cov-branch --cov-report=xml --cov-report=term-missing

[testenv:audit]
allowlist_externals = uv
dependency_groups = dev
commands =
    uv export --format requirements-txt --no-emit-project -o audit.txt
    uv run pip-audit -r audit.txt --require-hashes
    uv run safety scan

[testenv:format]
allowlist_externals = uv
dependency_groups = dev
commands =
    uv run ruff format nshm_model_graphql_api tests

[testenv:lint]
allowlist_externals = uv
dependency_groups = dev
commands =
    uv run ruff check nshm_model_graphql_api tests
    uv run mypy nshm_model_graphql_api tests

[testenv:build]
allowlist_externals = uv
dependency_groups = dev
commands =
    uv build

[tool:pytest]
testpaths =
    nshm_model_graphql_api
    tests
python_files = tests.py test_*.py *_tests.py
