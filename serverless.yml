# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: gnssciencenshm
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: nshm-model-graphql-api
service: nzshm22-model-graphql-api
configValidationMode: error

# serverless-wsgi (which used to package the Python deps) is gone — the handler is now
# Mangum (nshm_model_graphql_api.app.handler). Python deps are still packaged into the
# zip by Serverless Framework v4's BUILT-IN python-requirements, which activates from the
# `custom.pythonRequirements` block below and installs from requirements.txt (generated
# from uv by the `deploy` script in package.json). No plugin needed.

package:
  individually: false
  patterns:
    - '!__pycache__/**'
    - '!.git/**'
    - '!.github/**'
    - '!.pytest_cache/**'
    - '!.mypy_cache/**'
    - '!.tox/**'
    - '!dist/**'
    - '!docs/**'
    - '!node_modules/**'
    - '!package.json'
    - '!package-log.json'
    - '!tests/**'
    - '!**'
    - nshm_model_graphql_api/**

custom:
  #serverless-python-requirements settings
  pythonRequirements:
    dockerizePip: True
    useDownloadCache: false
    useStaticCache: false
    slim: true
    slimPatterns:
      - '**/*.egg-info*'
    noDeploy:
      - botocore

# DRY constants: define all compound/generated names in one place
# Override args are: .. defaults:
# --app_acroym          signed-uploader
# --s3_bucket           self:custom.app_acronym
# --s3_key_base         self:custom.stage
# --region              us-east-1
# --stage               test
# --deletion_policy     delete

  app_acronym: ${opt:acronym, self:service}
  default_stage: local
  stage: ${opt:stage, self:custom.default_stage}
  stack_name: ${self:custom.app_acronym}-${self:custom.stage}
  region: ${opt:region, self:provider.region}
  deletion_policy: Delete
  # Default to using app_acronym as bucket name

  #elastic search
  esDomainName: ${self:custom.app_acronym}-es-${self:custom.stage}
  esIndex: nshm_model_index


provider:
  name: aws
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  region: ap-southeast-2
  environment:
    REGION: ${self:custom.region}
    DEPLOYMENT_STAGE: ${self:custom.stage}
  iamRoleStatements:
    # ES access policy
    # modelled on https://github.com/serverless/examples/blob/master/aws-golang-dynamo-stream-to-elasticsearch/serverless.yml
    # - Effect: Allow
    #   Action:
    #     - es:ESHttpPost
    #     - es:ESHttpPut
    #     - es:ESHttpHead
    #     - es:ESHttpGet
    #   Resource:
    #     - { "Fn::GetAtt": ["ElasticSearchInstance", "DomainArn"] }
    #     - { "Fn::Join": ["", ["Fn::GetAtt": ["ElasticSearchInstance", "DomainArn"], "/*"]] }
    -  Effect: Allow
       Action:
         - "cloudwatch:PutMetricData"
       Resource: "*"

  apiGateway:
    apiKeys:
      - name: TempApiKey-${self:custom.stack_name}
        description: Api key until we have an auth function # Optional

functions:
  app:
    description: The graphql API of ${self:service}
    handler: nshm_model_graphql_api.app.handler
    memorySize: 1024 # halved from legacy 2048 (runbook §4.4); monitor CloudWatch before further change
    timeout: 10 # optional, in seconds, default is 6
    events:
      - http:
          path: graphql
          method: OPTIONS
      - http:
          path: graphql
          method: POST
          private: true
      - http:
          path: graphql
          method: GET          
      - http:
          path: graphql/{proxy+}
          method: GET
      - http:
          path: static/{proxy+}
          method: GET                                       
    environment:
      STACK_NAME: ${self:custom.stack_name}

